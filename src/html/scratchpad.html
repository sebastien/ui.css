<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>LittleCSS Scratchpad</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/palette.css" />
    <script type="importmap">
      {"imports": {"@littlecss.js": "../js/littlecss.js", "@littlecss/": "../css/"}}
    </script>
  </head>
  <body class="p-8 t">
    <h1>LittleCSS Scratchpad</h1>
    <section>
      <h2>Buttons</h2>
      <h3>State</h3>
      <blockquote>
        <button >Default</button>
        <button class="focus">Focus</button>
        <button class="hover">Hover</button>
        <button class="active">Active</button>
        <button class="selected">Selected</button>
        <button disabled>Disabled</button>
      </blockquote>
      <h3>Color</h3>
      <blockquote>
        <button class="neutral">Neutral</button>
        <button class="primary">Primary</button>
        <button class="secondary">Secondary</button>
        <button class="tertiary">Tertiary</button>
        <button class="success">Success</button>
        <button class="warning">Warning</button>
        <button class="danger">Danger</button>
      </blockquote>
      <h3>Style</h3>
      <blockquote>
        <button class="default">Default</button>
        <button class="outline">Outline</button>
        <button class="blank">Blank</button>
        <button class="bare">Bare</button>
        <button class="icon">I</button>
      </blockquote>
      <h3>Rounding</h3>
      <blockquote>
        <button class="normal">Normal</button>
        <button class="rounded">Rounded</button>
        <button class="rounder">Rounder</button>
        <button class="roundest">Roundest</button>
      </blockquote>
      <h3>Size</h3>
      <blockquote>
        <button class="smallest">Smallest</button>
        <button class="smaller">Smaller</button>
        <button class="small">Small</button>
        <button class="regular">Regular</button>
        <button class="large">Large</button>
        <button class="larger">Larger</button>
        <button class="largest">Largest</button>
      </blockquote>
    </section>
    <section>
      <h2>Inputs</h2>
      <div class="row stretch g-4">
        <div>
          <h3>State</h3>
          <blockquote class="stack g-2 bg-neutral-9 bg p-4">
            <input                  placeholder="Default" />
            <input class="focus"    placeholder="Focus" />
            <input class="hover"    placeholder="Hover" />
            <input class="active"   placeholder="Active" />
            <input class="selected" placeholder="Selected" />
            <input disabled placeholder="Disabled" />
          </blockquote>
        </div>
        <div>
          <h3>Color</h3>
          <blockquote class="stack g-2 bg-neutral-9 bg p-4">
            <input class="neutral"   placeholder="Neutral" />
            <input class="primary"   placeholder="Primary" />
            <input class="secondary" placeholder="Secondary" />
            <input class="tertiary"  placeholder="Tertiary" />
            <input class="success"   placeholder="Success" />
            <input class="warning"   placeholder="Warning" />
            <input class="danger"    placeholder="Danger" />
          </blockquote>
        </div>
        <div>
          <h3>Style</h3>
          <blockquote class="stack g-2 bg-neutral-9 bg p-4">
            <input class="default"   placeholder="Default" />
            <input class="outline"   placeholder="Outline" />
            <input class="blank" placeholder="Blank" />
            <input class="bare"  placeholder="Bare" />
          </blockquote>
        </div>
      </div>
    </section>
    <section>
      <h2>Textarea</h2>
      <div class="row stretch g-4">
        <div>
          <h3>State</h3>
          <blockquote class="stack g-2 bg-neutral-9 bg p-4">
            <textarea                  placeholder="Default"></textarea>
            <textarea class="focus"    placeholder="Focus"></textarea>
            <textarea class="hover"    placeholder="Hover"></textarea>
            <textarea class="active"   placeholder="Active"></textarea>
            <textarea class="selected" placeholder="Selected"></textarea>
            <textarea disabled placeholder="Disabled"></textarea>
          </blockquote>
        </div>
        <div>
          <h3>Color</h3>
          <blockquote class="stack g-2 bg-neutral-9 bg p-4">
            <textarea class="neutral"   placeholder="Neutral"></textarea>
            <textarea class="primary"   placeholder="Primary"></textarea>
            <textarea class="secondary" placeholder="Secondary"></textarea>
            <textarea class="tertiary"  placeholder="Tertiary"></textarea>
            <textarea class="success"   placeholder="Success"></textarea>
            <textarea class="warning"   placeholder="Warning"></textarea>
            <textarea class="danger"    placeholder="Danger"></textarea>
          </blockquote>
        </div>
        <div>
          <h3>Style</h3>
          <blockquote class="stack g-2 bg-neutral-9 bg p-4">
            <textarea class="default"   placeholder="Default"></textarea>
            <textarea class="outline"   placeholder="Outline"></textarea>
            <textarea class="blank" placeholder="Blank"></textarea>
            <textarea class="bare"  placeholder="Bare"></textarea>
          </blockquote>
        </div>
      </div>
    </section>
    <section>
      <h2>Checkbox</h2>
      <div class="row stretch g-4">
        <div>
          <h3>Value</h3>
          <blockquote class="stack g-2 bg-neutral-9 bg p-4">
            <label class="row g-2"><input type="checkbox" /> Empty (unchecked)</label>
            <label class="row g-2"><input type="checkbox" data-state="partial" /> Partial (indeterminate)</label>
            <label class="row g-2"><input type="checkbox" checked /> Checked</label>
          </blockquote>
        </div>
        <div>
          <h3>State</h3>
          <blockquote class="stack g-2 bg-neutral-9 bg p-4">
            <label class="row g-2"><input type="checkbox" class="focus" /> Focus</label>
            <label class="row g-2"><input type="checkbox" class="hover" /> Hover</label>
            <label class="row g-2"><input type="checkbox" class="active" /> Active</label>
            <label class="row g-2"><input type="checkbox" disabled /> Disabled</label>
          </blockquote>
        </div>
        <div>
          <h3>Color</h3>
          <blockquote class="stack g-2 bg-neutral-9 bg p-4">
            <label class="row g-2"><input type="checkbox" class="neutral" /> Neutral</label>
            <label class="row g-2"><input type="checkbox" class="primary" /> Primary</label>
            <label class="row g-2"><input type="checkbox" class="secondary" /> Secondary</label>
            <label class="row g-2"><input type="checkbox" class="tertiary" /> Tertiary</label>
            <label class="row g-2"><input type="checkbox" class="success" /> Success</label>
            <label class="row g-2"><input type="checkbox" class="warning" /> Warning</label>
            <label class="row g-2"><input type="checkbox" class="danger" /> Danger</label>
          </blockquote>
        </div>
        <div>
          <h3>Style</h3>
          <blockquote class="stack g-2 bg-neutral-9 bg p-4">
            <label class="row g-2"><input type="checkbox" class="default" /> Default</label>
            <label class="row g-2"><input type="checkbox" class="outline" /> Outline</label>
            <label class="row g-2"><input type="checkbox" class="blank" /> Blank</label>
            <label class="row g-2"><input type="checkbox" class="bare" /> Bare</label>
          </blockquote>
        </div>
      </div>
    </section>
    <section>
      <h2>Radio</h2>
      <div class="row stretch g-4">
        <div>
          <h3>Value</h3>
          <blockquote class="stack g-2 bg-neutral-9 bg p-4">
            <label class="row g-2"><input type="radio" name="radio-value" /> Empty (unchecked)</label>
            <label class="row g-2"><input type="radio" name="radio-value" checked /> Checked</label>
          </blockquote>
        </div>
        <div>
          <h3>State</h3>
          <blockquote class="stack g-2 bg-neutral-9 bg p-4">
            <label class="row g-2"><input type="radio" name="radio-state" class="focus" /> Focus</label>
            <label class="row g-2"><input type="radio" name="radio-state" class="hover" /> Hover</label>
            <label class="row g-2"><input type="radio" name="radio-state" class="active" /> Active</label>
            <label class="row g-2"><input type="radio" name="radio-state" disabled /> Disabled</label>
          </blockquote>
        </div>
        <div>
          <h3>Color</h3>
          <blockquote class="stack g-2 bg-neutral-9 bg p-4">
            <label class="row g-2"><input type="radio" name="radio-color" class="neutral" /> Neutral</label>
            <label class="row g-2"><input type="radio" name="radio-color" class="primary" /> Primary</label>
            <label class="row g-2"><input type="radio" name="radio-color" class="secondary" /> Secondary</label>
            <label class="row g-2"><input type="radio" name="radio-color" class="tertiary" /> Tertiary</label>
            <label class="row g-2"><input type="radio" name="radio-color" class="success" /> Success</label>
            <label class="row g-2"><input type="radio" name="radio-color" class="warning" /> Warning</label>
            <label class="row g-2"><input type="radio" name="radio-color" class="danger" /> Danger</label>
          </blockquote>
        </div>
        <div>
          <h3>Style</h3>
          <blockquote class="stack g-2 bg-neutral-9 bg p-4">
            <label class="row g-2"><input type="radio" name="radio-style" class="default" /> Default</label>
            <label class="row g-2"><input type="radio" name="radio-style" class="outline" /> Outline</label>
            <label class="row g-2"><input type="radio" name="radio-style" class="blank" /> Blank</label>
            <label class="row g-2"><input type="radio" name="radio-style" class="bare" /> Bare</label>
          </blockquote>
        </div>
      </div>
    </section>
    <script type="module">
      import all from "@littlecss/all";
      import css from "@littlecss.js";

      css.mount(all());

      // Set indeterminate state for partial checkboxes
      document.querySelectorAll('input[type="checkbox"][data-state="partial"]').forEach(cb => {
        cb.indeterminate = true;
      });
    </script>
  </body>
</html>
